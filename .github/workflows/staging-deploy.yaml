name: Staging Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "contentlayer.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.cjs"
      - "wrangler.jsonc"
      - "tsconfig*.json"

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: blog
  WORKERS_SUBDOMAIN: ${{ secrets.WORKERS_SUBDOMAIN }}

jobs:
  staging-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.12.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to staging
        run: |
          pnpm exec wrangler versions upload --preview-alias staging

          STAGING_URL="https://staging-${{ env.WORKER_NAME }}.${{ env.WORKERS_SUBDOMAIN }}.workers.dev"
          echo "Deployed to: ${STAGING_URL}"
