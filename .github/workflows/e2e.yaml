name: E2E Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "e2e/**"
      - "lib/**"
      - "themes/**"
      - "public/**"
      - "playwright.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "index.html"
      - "scripts/**"
      - "vite.config.ts"
      - "contentlayer.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.cjs"
      - "wrangler.jsonc"
      - "tsconfig*.json"
      - ".github/workflows/e2e.yaml"
      - ".github/actions/setup-playwright/action.yml"
  workflow_dispatch:

jobs:
  wait-for-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for prerequisite checks
        uses: actions/github-script@v8
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const required = [
              { key: 'Check PR Labels', match: (n) => n === 'check-labels' },
              { key: 'Lint & Format Check', match: (n) => n === 'lint' || n.startsWith('lint (') },
            ];
            const timeoutMs = 15 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
              });
              const statuses = required.map(({ key, match }) => {
                const runs = data.check_runs
                  .filter((c) => match(c.name))
                  .sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
                const latest = runs[0];
                return {
                  key,
                  status: latest?.status ?? 'not_scheduled',
                  conclusion: latest?.conclusion ?? null,
                };
              });
              core.info(JSON.stringify(statuses));
              const failed = statuses.filter(
                (s) =>
                  s.status === 'completed' &&
                  !['success', 'neutral', 'skipped'].includes(s.conclusion),
              );
              if (failed.length > 0) {
                core.setFailed(
                  `Prerequisite failed: ${failed.map((f) => f.key).join(', ')}`,
                );
                return;
              }
              if (statuses.every((s) => s.status === 'completed')) {
                core.info('All prerequisite checks passed');
                return;
              }
              await new Promise((r) => setTimeout(r, intervalMs));
            }
            core.setFailed('Timed out waiting for prerequisite checks');

  e2e:
    needs: wait-for-checks
    if: |
      always() &&
      (needs.wait-for-checks.result == 'success' ||
       needs.wait-for-checks.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.16.0]
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Playwright
        uses: ./.github/actions/setup-playwright

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
