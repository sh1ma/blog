name: Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "手動で cleanup したい PR 番号"
        required: true
        type: string

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: blog

jobs:
  preview-cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Delete preview alias versions
        id: cleanup
        env:
          PR_NUM: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          set -euo pipefail
          ALIAS="pr-${PR_NUM}"
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"

          # 全 version から pr-{N} alias が付いているものを収集。
          # 全ページ舐めるのは重いので、対象 alias が見つからないページが続いたら早期打ち切り。
          # alias は最新の version が保持する annotation なので、通常は最初の数ページで見つかる。
          # ただし過去に何度も upload された PR は複数ページに散っている可能性あり。
          VERSIONS=""
          PAGE=1
          EMPTY_PAGES=0
          while [ "${PAGE}" -le 20 ]; do
            PAGE_JSON=$(curl -fsS \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "${API}/workers/scripts/${WORKER_NAME}/versions?per_page=100&page=${PAGE}")
            COUNT_ON_PAGE=$(echo "${PAGE_JSON}" | jq -r '.result.items | length')
            if [ "${COUNT_ON_PAGE}" = "0" ]; then
              break
            fi
            MATCH_IDS=$(echo "${PAGE_JSON}" | jq -r --arg alias "${ALIAS}" \
              '.result.items[] | select(.annotations["workers/alias"] == $alias) | .id')
            if [ -n "${MATCH_IDS}" ]; then
              VERSIONS="${VERSIONS}${MATCH_IDS}"$'\n'
              EMPTY_PAGES=0
            else
              EMPTY_PAGES=$((EMPTY_PAGES + 1))
              # 3 ページ連続でヒットしなくなったら打ち切り
              if [ "${EMPTY_PAGES}" -ge 3 ] && [ -n "${VERSIONS}" ]; then
                break
              fi
              # まだ 1 件もヒットしていない場合は 5 ページまで探す
              if [ "${EMPTY_PAGES}" -ge 5 ] && [ -z "${VERSIONS}" ]; then
                break
              fi
            fi
            PAGE=$((PAGE + 1))
          done

          # 重複除去 + 空行削除
          VERSIONS=$(echo "${VERSIONS}" | awk 'NF' | sort -u)

          if [ -z "${VERSIONS}" ]; then
            echo "No preview version found for alias ${ALIAS}. Nothing to delete."
            echo "deleted=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT=0
          for VID in ${VERSIONS}; do
            echo "Deleting version ${VID} (alias=${ALIAS})"
            HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X DELETE \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "${API}/workers/workers/${WORKER_NAME}/versions/${VID}")
            if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "204" ]; then
              echo "Failed to delete version ${VID} (HTTP ${HTTP_CODE}):"
              cat /tmp/resp.json
              exit 1
            fi
            COUNT=$((COUNT + 1))
          done

          echo "Deleted ${COUNT} version(s) for alias ${ALIAS}."
          echo "deleted=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Update PR comment
        if: always()
        uses: actions/github-script@v8
        env:
          CLEANUP_OUTCOME: ${{ steps.cleanup.outcome }}
          DELETED_COUNT: ${{ steps.cleanup.outputs.deleted }}
          PR_NUM: ${{ github.event.pull_request.number || inputs.pr_number }}
        with:
          script: |
            const prNum = Number(process.env.PR_NUM);
            if (!Number.isInteger(prNum) || prNum <= 0) {
              core.info(`No valid PR number (got ${process.env.PR_NUM}); skipping comment update.`);
              return;
            }

            const outcome = process.env.CLEANUP_OUTCOME;
            const deleted = process.env.DELETED_COUNT;

            let body;
            if (outcome === 'success') {
              body = deleted === '0'
                ? `## Preview Deploy\n\n**Status**: :information_source: 削除対象の preview version はありませんでした。`
                : `## Preview Deploy\n\n**Status**: :wastebasket: PR がクローズされたため、preview version (${deleted} 件) を削除しました。`;
            } else {
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              body = `## Preview Deploy\n\n**Status**: :warning: preview の削除に失敗しました。[ワークフローログ](${runUrl}) を確認してください。`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deploy')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            }
